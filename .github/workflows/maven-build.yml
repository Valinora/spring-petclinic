on: [push]
name: Linux_Container_Workflow

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
        # checkout the repo
        - name: 'Checkout GitHub Action'
          uses: actions/checkout@main
          
        - name: 'Login via Azure CLI'
          uses: azure/login@v1
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
        
        - name: 'Build and push image'
          uses: azure/docker-login@v1
          with:
            login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
            username: ${{ secrets.REGISTRY_USERNAME }}
            password: ${{ secrets.REGISTRY_PASSWORD }}
        - run: |
            ./mvnw spring-boot:build-image
            docker tag spring-petclinic:3.1.0 ${{ secrets.REGISTRY_LOGIN_SERVER }}/spring-petclinic:3.1.0
            docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/spring-petclinic:3.1.0

        - name: Set environment variable'
          uses: azure/appservice-settings@v1
          with:
              app-name: spring-petclinic
              app-settings-json: |
                  [
                      {
                          "name": "WEBSITES_PORT",
                          "value": "8080",
                          "slotSetting": false
                      }
                  ]
        - name: 'Run Azure webapp deploy action using publish profile credentials'
          uses: azure/webapps-deploy@v3
          with: 
            app-name: spring-petclinic
            images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/spring-petclinic:${{ github.sha }}'
